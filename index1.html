<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Bombanana - 3D Multiplayer Bomber</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Three.js CDN để dựng đồ họa 3D -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- PeerJS CDN để xử lý kết nối P2P Multiplayer -->
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>

    <!-- Giao diện Phòng chờ (Lobby) -->
    <div id="lobby-container">
        <div class="lobby-card">
            <h1>🍌 Bombanana 3D</h1>
            <p class="subtitle">Game đặt bom chuối Multiplayer P2P</p>
            
            <hr>

            <!-- Khối dành cho Người tạo phòng -->
            <div class="menu-section">
                <button id="btn-host" class="btn primary">Tạo Phòng (Host)</button>
                <div id="host-info" class="hidden">
                    <p>Chia sẻ mã này với bạn bè:</p>
                    <div class="peer-id-box">
                        <span id="peer-id">Đang lấy mã...</span>
                    </div>
                    <span class="pulse-dot"></span> <span class="status-text">Đang chờ đối thủ vào phòng...</span>
                </div>
            </div>

            <div class="separator">HOẶC</div>

            <!-- Khối dành cho Người tham gia -->
            <div class="menu-section">
                <input type="text" id="join-id" placeholder="Nhập mã phòng của bạn bè...">
                <button id="btn-join" class="btn secondary">Vào Phòng (Guest)</button>
            </div>
            
            <!-- Thông báo trạng thái -->
            <div id="status-message"></div>
        </div>
    </div>

    <!-- Giao diện trong game (UI Overlay) -->
    <div id="game-ui" class="hidden">
        <div id="hud">
            <div class="player-status standard">
                <span class="dot player-blue"></span> Bạn: <span id="my-status">Sống</span>
            </div>
            <div class="player-status standard">
                <span class="dot player-red"></span> Đối thủ: <span id="opp-status">Sống</span>
            </div>
        </div>
        <div id="announcement" class="hidden"></div>
    </div>

    <!-- Hệ thống nút bấm ảo cho thiết bị di động (Mobile Controls) -->
    <div id="mobile-controls" class="hidden">
        <!-- Nút D-Pad di chuyển -->
        <div class="dpad">
            <button id="ctrl-up" class="dpad-btn up">▲</button>
            <div class="dpad-row">
                <button id="ctrl-left" class="dpad-btn left">◀</button>
                <div class="dpad-spacer"></div>
                <button id="ctrl-right" class="dpad-btn right">▶</button>
            </div>
            <button id="ctrl-down" class="dpad-btn down">▼</button>
        </div>
        
        <!-- Nút đặt bom -->
        <button id="ctrl-bomb">🍌</button>
    </div>

    <!-- Nhúng file logic xử lý game -->
    <script src="game.js"></script>
</body>
</html>
